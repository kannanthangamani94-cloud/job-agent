name: Daily Job Agent v2

on:
  schedule:
    - cron: "0 13 * * 1-5"   # 8 AM Eastern (EDT = UTC-5 in winter, UTC-4 in summer)
  workflow_dispatch:          # lets you click "Run workflow" manually to test

jobs:
  run-job-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit seen_jobs.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests anthropic feedparser

      - name: Run job agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD:   ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
          USAJOBS_API_KEY:   ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL:     ${{ secrets.USAJOBS_EMAIL }}
        run: python job_agent.py

      - name: Save seen_jobs memory to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json || true
          git diff --staged --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          git push
